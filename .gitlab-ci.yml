# =============================================================================
# CubeOS Docsindex Pipeline — Build multi-arch image, push to GHCR, deploy
# =============================================================================

stages:
  - validate
  - package
  - deploy

variables:
  DOCSINDEX_IMAGE: "ghcr.io/cubeos-app/cubeos-docsindex"

# -----------------------------------------------------------------------------
# CONSISTENCY CHECK — CubeOS critical rules gate (minimal: traceability only)
# -----------------------------------------------------------------------------
lint:consistency:
  stage: validate
  image: alpine:latest
  tags: [multiarch]
  variables:
    GIT_DEPTH: 50
  before_script:
    - apk add --no-cache git bash
  script:
    - |
      bash <<'CONSISTENCY_CHECK'
      WARNINGS=()
      if ! echo "$CI_COMMIT_MESSAGE" | grep -qE '\[CUBEOS-[0-9]+\]'; then
        if ! echo "$CI_COMMIT_MESSAGE" | grep -qE '^chore: bump version'; then
          WARNINGS+=("Traceability: commit has no [CUBEOS-XX] reference")
        fi
      fi
      echo ""
      echo "=== Consistency Check: docsindex ==="
      if [ ${#WARNINGS[@]} -gt 0 ]; then
        echo "WARNINGS (review recommended):"
        for w in "${WARNINGS[@]}"; do echo "  [WARN]  $w"; done
      else
        echo "  All checks passed."
      fi
      echo "PASSED"
      CONSISTENCY_CHECK
  rules:
    - when: always
  allow_failure: true

# -----------------------------------------------------------------------------
# PACKAGE — Build multi-arch Docker image and push to GHCR
# -----------------------------------------------------------------------------
package:
  stage: package
  tags: [multiarch]
  image: docker:24
  before_script:
    - echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USER" --password-stdin
    - docker buildx create --name docsindexbuilder --driver docker-container --use
    - docker buildx inspect --bootstrap
  script:
    - |
      echo "Building multi-arch docsindex image..."
      docker buildx build --no-cache \
        --platform linux/amd64,linux/arm64 \
        --push \
        -t ${DOCSINDEX_IMAGE}:${CI_COMMIT_SHORT_SHA} \
        -t ${DOCSINDEX_IMAGE}:latest \
        .
      echo "Pushed multi-arch ${DOCSINDEX_IMAGE}:${CI_COMMIT_SHORT_SHA}"
  after_script:
    - docker buildx rm docsindexbuilder || true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# -----------------------------------------------------------------------------
# DEPLOY — Redeploy Swarm stack on Pi (via SSH)
# -----------------------------------------------------------------------------
deploy:
  stage: deploy
  tags: [multiarch]
  image: alpine:latest
  needs:
    - package
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$CI_DEPLOY_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    # Resolve deploy target — try primary, fall back to alt interface
    - |
      _RESOLVED=""
      for ADDR in ${PI_DEPLOY_ADDR} ${PI_DEPLOY_ADDR_ALT}; do
        [ -z "$ADDR" ] && continue
        ssh-keyscan -H "$ADDR" >> ~/.ssh/known_hosts 2>/dev/null || true
        if ssh -o ConnectTimeout=5 -o BatchMode=yes "cubeos@${ADDR}" true 2>/dev/null; then
          _RESOLVED="$ADDR"
          break
        fi
      done
      if [ -z "$_RESOLVED" ]; then
        echo "ERROR: Pi unreachable at ${PI_DEPLOY_ADDR} / ${PI_DEPLOY_ADDR_ALT}"
        exit 1
      fi
      export PI_DEPLOY_ADDR="$_RESOLVED"
      export PI_DEPLOY_HOST="cubeos@${_RESOLVED}"
      echo "Deploy target: ${PI_DEPLOY_HOST}"
  script:
    - scp scripts/ci-deploy.sh ${PI_DEPLOY_HOST}:/tmp/ci-deploy-docsindex.sh
    - |
      ssh -o ServerAliveInterval=15 ${PI_DEPLOY_HOST} \
        "GHCR_TOKEN='${GHCR_TOKEN}' GHCR_USER='${GHCR_USER}' bash /tmp/ci-deploy-docsindex.sh"
    - ssh ${PI_DEPLOY_HOST} "rm -f /tmp/ci-deploy-docsindex.sh"
  after_script:
    - kill $SSH_AGENT_PID 2>/dev/null || true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  environment:
    name: production
